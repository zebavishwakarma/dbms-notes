<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="12">

  <!-- Background -->
  <rect width="900" height="620" fill="#0d1117"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" fill="#58a6ff" font-size="16" font-weight="bold">University Database — ER Diagram</text>

  <!-- ========== ENTITIES ========== -->

  <!-- STUDENT entity -->
  <rect x="60" y="60" width="160" height="40" fill="none" stroke="#58a6ff" stroke-width="2"/>
  <text x="140" y="85" text-anchor="middle" fill="#58a6ff" font-weight="bold">STUDENT</text>

  <!-- STUDENT attributes -->
  <ellipse cx="60" cy="150" rx="45" ry="18" fill="none" stroke="#8b949e" stroke-width="1.2"/>
  <text x="60" y="155" text-anchor="middle" fill="#e6edf3" font-size="11">RollNo</text>
  <ellipse cx="60" cy="150" rx="42" ry="15" fill="none" stroke="#8b949e" stroke-width="0.8"/><!-- double for key -->

  <ellipse cx="140" cy="155" rx="38" ry="17" fill="none" stroke="#8b949e" stroke-width="1.2"/>
  <text x="140" y="160" text-anchor="middle" fill="#e6edf3" font-size="11">Name</text>

  <ellipse cx="220" cy="150" rx="38" ry="17" fill="none" stroke="#8b949e" stroke-width="1.2"/>
  <text x="220" y="155" text-anchor="middle" fill="#e6edf3" font-size="11">Branch</text>

  <ellipse cx="50" cy="55" rx="32" ry="15" fill="none" stroke="#8b949e" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="50" y="59" text-anchor="middle" fill="#8b949e" font-size="10">Age</text>

  <!-- Lines: Student to attributes -->
  <line x1="100" y1="80" x2="65" y2="135" stroke="#8b949e" stroke-width="1"/>
  <line x1="120" y1="100" x2="140" y2="138" stroke="#8b949e" stroke-width="1"/>
  <line x1="180" y1="80" x2="215" y2="133" stroke="#8b949e" stroke-width="1"/>
  <line x1="80" y1="63" x2="65" y2="63" stroke="#8b949e" stroke-width="1"/>

  <!-- DEPARTMENT entity -->
  <rect x="620" y="60" width="180" height="40" fill="none" stroke="#3fb950" stroke-width="2"/>
  <text x="710" y="85" text-anchor="middle" fill="#3fb950" font-weight="bold">DEPARTMENT</text>

  <!-- DEPARTMENT attributes -->
  <ellipse cx="620" cy="155" rx="42" ry="17" fill="none" stroke="#8b949e" stroke-width="1.2"/>
  <text x="620" y="160" text-anchor="middle" fill="#e6edf3" font-size="11">DeptID</text>
  <ellipse cx="620" cy="155" rx="39" ry="14" fill="none" stroke="#8b949e" stroke-width="0.8"/>

  <ellipse cx="730" cy="150" rx="50" ry="18" fill="none" stroke="#8b949e" stroke-width="1.2"/>
  <text x="730" y="155" text-anchor="middle" fill="#e6edf3" font-size="11">DeptName</text>

  <ellipse cx="820" cy="150" rx="45" ry="18" fill="none" stroke="#8b949e" stroke-width="1.2"/>
  <text x="820" y="155" text-anchor="middle" fill="#e6edf3" font-size="11">Location</text>

  <!-- Lines: Dept to attributes -->
  <line x1="650" y1="80" x2="630" y2="138" stroke="#8b949e" stroke-width="1"/>
  <line x1="710" y1="100" x2="730" y2="132" stroke="#8b949e" stroke-width="1"/>
  <line x1="770" y1="75" x2="815" y2="133" stroke="#8b949e" stroke-width="1"/>

  <!-- COURSE entity -->
  <rect x="360" y="440" width="160" height="40" fill="none" stroke="#d29922" stroke-width="2"/>
  <text x="440" y="465" text-anchor="middle" fill="#d29922" font-weight="bold">COURSE</text>

  <!-- COURSE attributes -->
  <ellipse cx="310" cy="530" rx="48" ry="18" fill="none" stroke="#8b949e" stroke-width="1.2"/>
  <text x="310" y="535" text-anchor="middle" fill="#e6edf3" font-size="11">CourseID</text>
  <ellipse cx="310" cy="530" rx="45" ry="15" fill="none" stroke="#8b949e" stroke-width="0.8"/>

  <ellipse cx="440" cy="540" rx="55" ry="18" fill="none" stroke="#8b949e" stroke-width="1.2"/>
  <text x="440" y="545" text-anchor="middle" fill="#e6edf3" font-size="11">CourseName</text>

  <ellipse cx="570" cy="530" rx="38" ry="17" fill="none" stroke="#8b949e" stroke-width="1.2"/>
  <text x="570" y="535" text-anchor="middle" fill="#e6edf3" font-size="11">Credits</text>

  <!-- Lines: Course to attributes -->
  <line x1="390" y1="475" x2="328" y2="513" stroke="#8b949e" stroke-width="1"/>
  <line x1="440" y1="480" x2="440" y2="522" stroke="#8b949e" stroke-width="1"/>
  <line x1="490" y1="475" x2="550" y2="513" stroke="#8b949e" stroke-width="1"/>

  <!-- ========== RELATIONSHIPS ========== -->

  <!-- ENROLLS diamond (Student - Course) -->
  <polygon points="440,280 490,320 440,360 390,320" fill="none" stroke="#bc8cff" stroke-width="2"/>
  <text x="440" y="325" text-anchor="middle" fill="#bc8cff" font-weight="bold">ENROLLS</text>

  <!-- BELONGS TO diamond (Student - Department) -->
  <polygon points="440,130 490,160 440,190 390,160" fill="none" stroke="#ff7b72" stroke-width="2"/>
  <text x="440" y="165" text-anchor="middle" fill="#ff7b72" font-weight="bold" font-size="11">BELONGS</text>

  <!-- OFFERS diamond (Department - Course) -->
  <polygon points="620,330 670,360 620,390 570,360" fill="none" stroke="#39d353" stroke-width="2"/>
  <text x="620" y="365" text-anchor="middle" fill="#39d353" font-weight="bold" font-size="11">OFFERS</text>

  <!-- ========== RELATIONSHIP LINES ========== -->

  <!-- Student -- BELONGS TO -->
  <line x1="200" y1="80" x2="390" y2="150" stroke="#ff7b72" stroke-width="1.5"/>
  <!-- BELONGS TO -- Department -->
  <line x1="490" y1="155" x2="620" y2="80" stroke="#ff7b72" stroke-width="1.5"/>

  <!-- Student -- ENROLLS -->
  <line x1="140" y1="100" x2="400" y2="305" stroke="#bc8cff" stroke-width="1.5"/>
  <!-- ENROLLS -- Course -->
  <line x1="440" y1="360" x2="440" y2="440" stroke="#bc8cff" stroke-width="1.5"/>

  <!-- Department -- OFFERS -->
  <line x1="680" y1="100" x2="645" y2="330" stroke="#39d353" stroke-width="1.5"/>
  <!-- OFFERS -- Course -->
  <line x1="580" y1="360" x2="520" y2="440" stroke="#39d353" stroke-width="1.5"/>

  <!-- ========== CARDINALITY LABELS ========== -->
  <text x="220" y="120" fill="#8b949e" font-size="11">M</text>
  <text x="580" y="120" fill="#8b949e" font-size="11">1</text>
  <text x="195" y="250" fill="#8b949e" font-size="11">M</text>
  <text x="445" y="410" fill="#8b949e" font-size="11">N</text>
  <text x="658" y="210" fill="#8b949e" font-size="11">1</text>
  <text x="600" y="420" fill="#8b949e" font-size="11">N</text>

  <!-- ========== LEGEND ========== -->
  <rect x="30" y="570" width="840" height="1" fill="#30363d"/>
  <text x="30" y="600" fill="#8b949e" font-size="10">Rectangle = Entity</text>
  <text x="180" y="600" fill="#8b949e" font-size="10">Ellipse = Attribute</text>
  <text x="320" y="600" fill="#8b949e" font-size="10">Double ellipse = Key attribute</text>
  <text x="520" y="600" fill="#8b949e" font-size="10">Dashed ellipse = Derived attribute</text>
  <text x="730" y="600" fill="#8b949e" font-size="10">Diamond = Relationship</text>

</svg>
